[build]
  command = "npm run db:push && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# NOTE: All secret environment variables must be set in
# Netlify Dashboard -> Site Settings -> Environment Variables.
# Required vars:
# NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
# CLERK_SECRET_KEY
# CLERK_WEBHOOK_SECRET
# DATABASE_URL
# UPLOADTHING_TOKEN (base64 JSON: {apiKey, appId, regions})
# OPENROUTER_API_KEY
# APIFY_API_KEY
# FIRECRAWL_API_KEY
# RESEND_API_KEY
# EMAIL_FROM
# NEXT_PUBLIC_APP_URL
# NETLIFY_FUNCTION_SECRET
